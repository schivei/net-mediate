name: CI/CD Pipeline

permissions:
  contents: read
  pull-requests: write
  packages: write

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*', 'release/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET SDK 10.x
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore dependencies
      run: dotnet restore net-mediate.slnx
      
    - name: Build NetMediate
      run: dotnet build src/NetMediate/NetMediate.csproj --no-restore --configuration Release

    - name: Build NetMediate.Diagnostics
      run: dotnet build src/NetMediate.Diagnostics/NetMediate.Diagnostics.csproj --no-restore --configuration Release

    - name: Build NetMediate.Moq
      run: dotnet build src/NetMediate.Moq/NetMediate.Moq.csproj --no-restore --configuration Release

    - name: Build NetMediate.Resilience
      run: dotnet build src/NetMediate.Resilience/NetMediate.Resilience.csproj --no-restore --configuration Release

    - name: Build NetMediate.SourceGeneration
      run: dotnet build src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --configuration Release

    - name: Build NetMediate.DataDog.OpenTelemetry
      run: dotnet build src/NetMediate.DataDog.OpenTelemetry/NetMediate.DataDog.OpenTelemetry.csproj --configuration Release

    - name: Build NetMediate.DataDog.Serilog
      run: dotnet build src/NetMediate.DataDog.Serilog/NetMediate.DataDog.Serilog.csproj --configuration Release

    - name: Build NetMediate.DataDog.ILogger
      run: dotnet build src/NetMediate.DataDog.ILogger/NetMediate.DataDog.ILogger.csproj --configuration Release

    - name: Build NetMediate.Quartz
      run: dotnet build src/NetMediate.Quartz/NetMediate.Quartz.csproj --no-restore --configuration Release
      
    - name: Test
      run: dotnet test tests/NetMediate.Tests/NetMediate.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test Resilience
      run: dotnet test tests/NetMediate.Resilience.Tests/NetMediate.Resilience.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test Diagnostics
      run: dotnet test tests/NetMediate.Diagnostics.Tests/NetMediate.Diagnostics.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test Shared Parity (NetMediate)
      run: dotnet test tests/SharedParity.NetMediate.Tests/SharedParity.NetMediate.Tests.csproj --configuration Release --verbosity normal

    - name: Run Benchmarks (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
      run: |
        cd tests/NetMediate.Benchmarks
        dotnet run --configuration Release -- --job Short --exporters GitHub --filter '*' 2>&1 | tee /tmp/bench-console.txt || true
        REPORT=$(find BenchmarkDotNet.Artifacts -name '*-report-github.md' 2>/dev/null | head -1)
        if [ -n "$REPORT" ]; then
          # Remove any previous CI section from the static BENCHMARKS.md and append new results
          sed -i '/^## Latest CI Benchmark Run/,$d' ../../docs/BENCHMARKS.md
          {
            echo ""
            echo "---"
            echo ""
            echo "## Latest CI Benchmark Run"
            echo ""
            echo "Run: $(date -u '+%Y-%m-%d %H:%M UTC') | Branch: $GITHUB_HEAD_REF | Commit: ${GITHUB_SHA:0:7}"
            echo ""
            cat "$REPORT"
            echo ""
            echo "### Full Console Output"
            echo ""
            echo '```'
            cat /tmp/bench-console.txt
            echo '```'
          } >> ../../docs/BENCHMARKS.md
        fi

    - name: Commit benchmark results
      if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
      uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
      with:
        add: 'docs/BENCHMARKS.md'
        message: 'chore: update BENCHMARKS.md from CI benchmark run [skip ci]'
        default_author: github_actions
        push: 'origin HEAD:refs/heads/${{ github.head_ref }}'

    - name: Post coverage summary to PR
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        python3 << 'PYEOF'
        import xml.etree.ElementTree as ET, os, subprocess, sys, json

        MARKER = "<!-- netmediate-coverage-report -->"

        xml_files = [
            os.path.join(r, f)
            for r, _, files in os.walk('./coverage')
            for f in files if f == 'coverage.cobertura.xml'
        ]
        if not xml_files:
            print("No coverage.cobertura.xml found, skipping PR comment.")
            sys.exit(0)

        # Aggregate line and branch coverage across all coverage files (weighted by lines-valid)
        total_covered = 0
        total_valid   = 0
        total_branches_covered = 0
        total_branches_valid   = 0

        for xml_file in xml_files:
            root = ET.parse(xml_file).getroot()
            lv = int(root.get('lines-valid',   0) or 0)
            lc = int(root.get('lines-covered', 0) or 0)
            bv = int(root.get('branches-valid',   0) or 0)
            bc = int(root.get('branches-covered', 0) or 0)
            total_valid   += lv
            total_covered += lc
            total_branches_valid   += bv
            total_branches_covered += bc

        line_rate   = (total_covered / total_valid   * 100) if total_valid   > 0 else 0.0
        branch_rate = (total_branches_covered / total_branches_valid * 100) if total_branches_valid > 0 else 0.0

        emoji = '✅' if line_rate >= 80 else '⚠️' if line_rate >= 60 else '❌'
        sha   = os.environ['COMMIT_SHA'][:7]

        comment = (
            f"{MARKER}\n\n"
            f"## {emoji} Code Coverage Report — `{sha}`\n\n"
            f"| Metric | Coverage |\n"
            f"|--------|----------|\n"
            f"| **Lines** | {line_rate:.1f}% ({total_covered}/{total_valid} lines) |\n"
            f"| **Branches** | {branch_rate:.1f}% |\n\n"
            f"<sub>Generated by CI from `dotnet test --collect:\"XPlat Code Coverage\"`</sub>"
        )

        pr   = os.environ['PR_NUMBER']
        repo = os.environ['REPO']

        # Find an existing coverage comment by the bot with our marker and update it;
        # fall back to creating a new comment if none exists.
        list_result = subprocess.run(
            ['gh', 'api', f'repos/{repo}/issues/{pr}/comments',
             '--jq', f'[.[] | select(.body | startswith("{MARKER}")) | .id][0]'],
            capture_output=True, text=True
        )
        comment_id = list_result.stdout.strip()

        if comment_id and comment_id != 'null' and comment_id != '':
            subprocess.run(
                ['gh', 'api', f'repos/{repo}/issues/comments/{comment_id}',
                 '-X', 'PATCH', '-f', f'body={comment}'],
                check=True
            )
            print(f"Updated existing coverage comment {comment_id}.")
        else:
            subprocess.run(
                ['gh', 'pr', 'comment', pr, '--repo', repo, '--body', comment],
                check=True
            )
            print("Created new coverage comment.")
        PYEOF

  package:
    name: Package and Publish
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: (github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET SDK 10.x
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: dotnet restore net-mediate.slnx
      
    - name: Build Release (all projects/targets)
      run: dotnet build net-mediate.slnx --no-restore --configuration Release
      
    - name: Run Tests
      run: dotnet test tests/NetMediate.Tests/NetMediate.Tests.csproj --configuration Release --verbosity normal

    - name: Run Resilience Tests
      run: dotnet test tests/NetMediate.Resilience.Tests/NetMediate.Resilience.Tests.csproj --configuration Release --verbosity normal

    - name: Run Diagnostics Tests
      run: dotnet test tests/NetMediate.Diagnostics.Tests/NetMediate.Diagnostics.Tests.csproj --configuration Release --verbosity normal

    - name: Run Shared Parity Tests (NetMediate)
      run: dotnet test tests/SharedParity.NetMediate.Tests/SharedParity.NetMediate.Tests.csproj --configuration Release --verbosity normal
      
    - name: Pack NetMediate package
      run: dotnet pack src/NetMediate/NetMediate.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.Diagnostics package
      run: dotnet pack src/NetMediate.Diagnostics/NetMediate.Diagnostics.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.Moq package
      run: dotnet pack src/NetMediate.Moq/NetMediate.Moq.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.Resilience package
      run: dotnet pack src/NetMediate.Resilience/NetMediate.Resilience.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.SourceGeneration package
      run: dotnet pack src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.OpenTelemetry package
      run: dotnet pack src/NetMediate.DataDog.OpenTelemetry/NetMediate.DataDog.OpenTelemetry.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.Serilog package
      run: dotnet pack src/NetMediate.DataDog.Serilog/NetMediate.DataDog.Serilog.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.ILogger package
      run: dotnet pack src/NetMediate.DataDog.ILogger/NetMediate.DataDog.ILogger.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Pack NetMediate.Quartz package
      run: dotnet pack src/NetMediate.Quartz/NetMediate.Quartz.csproj --no-build --no-restore --configuration Release --output ./packages
      
    - name: List package contents
      run: ls -la ./packages/
      
    - name: Upload package artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
        retention-days: 90
        
    - name: Publish to NuGet
      if: github.ref == 'refs/heads/main'
      run: dotnet nuget push ./packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        
    - name: Publish to GitHub Packages
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      run: dotnet nuget push ./packages/*.nupkg --api-key $GITHUB_TOKEN --source https://nuget.pkg.github.com/schivei/index.json --skip-duplicate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
    - name: Download package artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: nuget-packages
        path: ./packages
        
    - name: Create Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        files: ./packages/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
