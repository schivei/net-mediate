name: Scheduled Auto-Publish

# Runs on the second Thursday of each month at 00:00 UTC.
# Days 8-14 always contain the second occurrence of any weekday.
on:
  schedule:
    - cron: '0 0 8-14 * 4'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read
  issues: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  auto-publish:
    name: Auto-Publish (Second Thursday)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK 10.x
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.x'

    - name: Cache NuGet packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore net-mediate.slnx

    - name: Build all projects
      run: dotnet build net-mediate.slnx --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet test tests/NetMediate.Tests/NetMediate.Tests.csproj --configuration Release --verbosity normal
        dotnet test tests/SharedParity.NetMediate.Tests/SharedParity.NetMediate.Tests.csproj --configuration Release --verbosity normal

    - name: Pack all packages
      run: |
        dotnet pack src/NetMediate/NetMediate.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.Diagnostics/NetMediate.Diagnostics.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.Moq/NetMediate.Moq.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.Resilience/NetMediate.Resilience.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.DataDog.OpenTelemetry/NetMediate.DataDog.OpenTelemetry.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.DataDog.Serilog/NetMediate.DataDog.Serilog.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.DataDog.ILogger/NetMediate.DataDog.ILogger.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.Adapters/NetMediate.Adapters.csproj --no-build --no-restore --configuration Release --output ./packages
        dotnet pack src/NetMediate.Quartz/NetMediate.Quartz.csproj --no-build --no-restore --configuration Release --output ./packages

    - name: Publish to NuGet
      run: dotnet nuget push ./packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Publish to GitHub Packages
      continue-on-error: true
      run: dotnet nuget push ./packages/*.nupkg --api-key $GITHUB_TOKEN --source https://nuget.pkg.github.com/schivei/index.json --skip-duplicate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create failure issue
      if: failure()
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
      with:
        script: |
          const date = new Date().toISOString().slice(0, 10);
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `[Auto-Publish] Scheduled publish failed on ${date}`,
            body: [
              '## Scheduled auto-publish failure',
              '',
              `The scheduled bi-monthly auto-publish workflow failed on **${date}**.`,
              '',
              `**Workflow run:** ${runUrl}`,
              '',
              '### What to check',
              '- Dependency version conflicts (wildcard `*` versions may have introduced a breaking change)',
              '- Test failures due to updated transitive dependencies',
              '- NuGet / GitHub Packages API key expiry',
              '',
              'Please investigate and resolve before the next scheduled run.',
            ].join('\n'),
            assignees: ['schivei'],
            labels: ['bug', 'auto-publish'],
          });
