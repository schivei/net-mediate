sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.cs

# Restrict analysis to C# source and test directories only (excludes website/, docs/, assets/, etc.)
sonar.sources=src
sonar.tests=tests

# Explicit exclusions as additional safety net
sonar.exclusions=**/website/**,website/**
sonar.cpd.exclusions=**/website/**,website/**
sonar.test.exclusions=**/website/**,website/**
