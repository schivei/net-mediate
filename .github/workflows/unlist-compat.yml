name: Unlist NetMediate.Compat from NuGet

# Manual one-shot execution only
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  PACKAGE_ID: NetMediate.Compat
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  unlist:
    name: Unlist all NetMediate.Compat versions
    runs-on: ubuntu-latest

    steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Fetch published versions
      id: versions
      run: |
        VERSIONS=$(curl -s "https://api.nuget.org/v3-flatcontainer/netmediate.compat/index.json" \
          | jq -r '.versions[]')
        echo "Found versions:"
        echo "$VERSIONS"
        {
          echo "versions<<EOF"
          echo "$VERSIONS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Unlist each version
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        VERSIONS=$(curl -s "https://api.nuget.org/v3-flatcontainer/netmediate.compat/index.json" \
          | jq -r '.versions[]')
        for VERSION in $VERSIONS; do
          echo "Unlisting ${{ env.PACKAGE_ID }} $VERSION ..."
          dotnet nuget delete "${{ env.PACKAGE_ID }}" "$VERSION" \
            --api-key "$NUGET_API_KEY" \
            --source "${{ env.NUGET_SOURCE }}" \
            --non-interactive
          echo "Done: $VERSION"
        done

    - name: Summary
      run: |
        echo "### NetMediate.Compat unlist complete" >> "$GITHUB_STEP_SUMMARY"
        echo "All published versions have been unlisted from NuGet.org." >> "$GITHUB_STEP_SUMMARY"
        echo "Unlisted packages remain downloadable via exact version reference but are hidden from search." >> "$GITHUB_STEP_SUMMARY"
