name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*', 'release/*' ]
    tags: [ 'v*' ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        
    - name: Setup .NET SDK 10.x
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Pre-build NetMediate (generates nupkg for source generation integration tests)
      run: |
        dotnet restore src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj
        dotnet build   src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --configuration Release --no-restore
        dotnet restore src/NetMediate/NetMediate.csproj
        dotnet build   src/NetMediate/NetMediate.csproj --configuration Release --no-restore
      # GeneratePackageOnBuild=true in pack.props places the nupkg in
      # src/NetMediate/bin/Release/, which is the RestoreAdditionalProjectSources
      # path used by tests/NetMediate.SourceGeneration.Tests (hardcoded to Release).

    - name: Restore dependencies
      run: dotnet restore net-mediate.slnx

    - name: Build NetMediate
      run: dotnet build src/NetMediate/NetMediate.csproj --configuration Release --no-restore

    - name: Build NetMediate.Diagnostics
      run: dotnet build src/NetMediate.Diagnostics/NetMediate.Diagnostics.csproj --configuration Release

    - name: Build NetMediate.Moq
      run: dotnet build src/NetMediate.Moq/NetMediate.Moq.csproj --configuration Release

    - name: Build NetMediate.Resilience
      run: dotnet build src/NetMediate.Resilience/NetMediate.Resilience.csproj --configuration Release

    - name: Build NetMediate.SourceGeneration
      run: dotnet build src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --configuration Release

    - name: Build NetMediate.DataDog.OpenTelemetry
      run: dotnet build src/NetMediate.DataDog.OpenTelemetry/NetMediate.DataDog.OpenTelemetry.csproj --configuration Release

    - name: Build NetMediate.DataDog.Serilog
      run: dotnet build src/NetMediate.DataDog.Serilog/NetMediate.DataDog.Serilog.csproj --configuration Release

    - name: Build NetMediate.DataDog.ILogger
      run: dotnet build src/NetMediate.DataDog.ILogger/NetMediate.DataDog.ILogger.csproj --configuration Release

    - name: Build NetMediate.Quartz
      run: dotnet build src/NetMediate.Quartz/NetMediate.Quartz.csproj --configuration Release
      
    - name: Test
      run: dotnet test tests/NetMediate.Tests/NetMediate.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test Resilience
      run: dotnet test tests/NetMediate.Resilience.Tests/NetMediate.Resilience.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test Diagnostics
      run: dotnet test tests/NetMediate.Diagnostics.Tests/NetMediate.Diagnostics.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Test SourceGeneration (package-reference integration)
      run: dotnet test tests/NetMediate.SourceGeneration.Tests/NetMediate.SourceGeneration.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      
    - name: Run Benchmarks (PR only)
      if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
      env:
        BRANCH: ${{ github.head_ref }}
        BASE_REF: ${{ github.base_ref }}
        COMMIT_SHA: ${{ github.sha }}
        BENCH_REPORT: ${{ runner.temp }}/bench-report.md
        BENCH_BASE_REPORT: ${{ runner.temp }}/bench-base-report.md
        BENCH_BASE: ${{ runner.temp }}/benchmarks-base.md
      run: |
        # ── 1. Run base-branch benchmark on the same machine (isolate execution) ──────
        # Using git worktree ensures the base branch is measured on identical hardware
        # in the same CI job, making the timing comparison directly meaningful.
        if ! git fetch origin "$BASE_REF" 2>/dev/null; then
          echo "::warning::Could not fetch $BASE_REF — base-branch benchmark will be skipped; timing comparison will use the stored baseline instead."
        fi
        BASE_WORKTREE=$(mktemp -d)
        if git worktree add "$BASE_WORKTREE" "origin/$BASE_REF" 2>/dev/null; then
          (
            cd "$BASE_WORKTREE"
            dotnet restore tests/NetMediate.Benchmarks/NetMediate.Benchmarks.csproj \
              -q --nologo 2>/dev/null || true
            dotnet build tests/NetMediate.Benchmarks/NetMediate.Benchmarks.csproj \
              --configuration Release --no-restore -q --nologo 2>/dev/null || true
            cd tests/NetMediate.Benchmarks
            dotnet run --no-build --configuration Release -- \
              --job Short --exporters GitHub --filter '*' 2>/dev/null || true
            BASE_RPT=$(find BenchmarkDotNet.Artifacts -name '*-report-github.md' \
              2>/dev/null | head -1)
            [ -n "$BASE_RPT" ] && cp "$BASE_RPT" "$BENCH_BASE_REPORT" || true
          ) 2>/dev/null || true
          git worktree remove "$BASE_WORKTREE" --force 2>/dev/null || true
        fi

        # ── 2. Run current-branch benchmark ─────────────────────────────────────────
        cd tests/NetMediate.Benchmarks
        dotnet run --configuration Release -- --job Short --exporters GitHub --filter '*' \
          2>&1 | tee "$RUNNER_TEMP/bench-console.txt" || true
        REPORT=$(find BenchmarkDotNet.Artifacts -name '*-report-github.md' 2>/dev/null | head -1)
        if [ -n "$REPORT" ]; then
          cp "$REPORT" "$BENCH_REPORT"
          cd ../..
          # Fetch base branch BENCHMARKS.md as fallback baseline (used when no live base run)
          git show "origin/$BASE_REF:docs/BENCHMARKS.md" > "$BENCH_BASE" 2>/dev/null \
            || echo '<!-- netmediate-bench-baseline: {} -->' > "$BENCH_BASE"
          python3 .github/scripts/update_benchmarks.py
        fi

    - name: Commit benchmark results
      if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
      uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
      with:
        add: 'docs/BENCHMARKS.md'
        message: 'chore: update BENCHMARKS.md from CI benchmark run [skip ci]'
        default_author: github_actions
        push: 'origin HEAD:refs/heads/${{ github.head_ref }}'

    - name: Update benchmark baseline (main branch only)
      # github-actions[bot] guard prevents an infinite CI loop: the commit made by
      # "Commit baseline update" below carries [skip ci] in the message, but the
      # actor check adds a second layer of protection for any runner that ignores
      # [skip ci].  Both the run step and the commit step use the same condition.
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
      env:
        BENCH_REPORT: ${{ runner.temp }}/bench-report.md
        BENCH_BASELINE_ONLY: 'true'
      run: |
        # Run benchmarks and update only the stored baseline comment in docs/BENCHMARKS.md.
        # This records post-merge metrics so that the next PR compares against the correct baseline.
        cd tests/NetMediate.Benchmarks
        dotnet run --configuration Release -- --job Short --exporters GitHub --filter '*' \
          2>&1 | tee "$RUNNER_TEMP/bench-console.txt" || true
        REPORT=$(find BenchmarkDotNet.Artifacts -name '*-report-github.md' 2>/dev/null | head -1)
        if [ -n "$REPORT" ]; then
          cp "$REPORT" "$BENCH_REPORT"
          cd ../..
          python3 .github/scripts/update_benchmarks.py
        fi

    - name: Commit baseline update (main branch only)
      # Same actor guard as the run step above — see comment there for rationale.
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
      uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
      with:
        add: 'docs/BENCHMARKS.md'
        message: 'chore: update benchmark baseline [skip ci]'
        default_author: github_actions
        push: 'origin HEAD:refs/heads/main'

    - name: Post coverage summary to PR
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        COMMIT_SHA: ${{ github.sha }}
      run: |
        python3 << 'PYEOF'
        import xml.etree.ElementTree as ET, os, subprocess, sys, json

        MARKER = "<!-- netmediate-coverage-report -->"

        xml_files = [
            os.path.join(r, f)
            for r, _, files in os.walk('./coverage')
            for f in files if f == 'coverage.cobertura.xml'
        ]
        if not xml_files:
            print("No coverage.cobertura.xml found, skipping PR comment.")
            sys.exit(0)

        # Aggregate line and branch coverage across all coverage files (weighted by lines-valid)
        total_covered = 0
        total_valid   = 0
        total_branches_covered = 0
        total_branches_valid   = 0

        for xml_file in xml_files:
            root = ET.parse(xml_file).getroot()
            lv = int(root.get('lines-valid',   0) or 0)
            lc = int(root.get('lines-covered', 0) or 0)
            bv = int(root.get('branches-valid',   0) or 0)
            bc = int(root.get('branches-covered', 0) or 0)
            total_valid   += lv
            total_covered += lc
            total_branches_valid   += bv
            total_branches_covered += bc

        line_rate   = (total_covered / total_valid   * 100) if total_valid   > 0 else 0.0
        branch_rate = (total_branches_covered / total_branches_valid * 100) if total_branches_valid > 0 else 0.0

        emoji = '✅' if line_rate >= 80 else '⚠️' if line_rate >= 60 else '❌'
        sha   = os.environ['COMMIT_SHA'][:7]

        comment = (
            f"{MARKER}\n\n"
            f"## {emoji} Code Coverage Report — `{sha}`\n\n"
            f"| Metric | Coverage |\n"
            f"|--------|----------|\n"
            f"| **Lines** | {line_rate:.1f}% ({total_covered}/{total_valid} lines) |\n"
            f"| **Branches** | {branch_rate:.1f}% |\n\n"
            f"<sub>Generated by CI from `dotnet test --collect:\"XPlat Code Coverage\"`</sub>"
        )

        pr   = os.environ['PR_NUMBER']
        repo = os.environ['REPO']

        # Find an existing coverage comment by the bot with our marker and update it;
        # fall back to creating a new comment if none exists.
        list_result = subprocess.run(
            ['gh', 'api', f'repos/{repo}/issues/{pr}/comments',
             '--jq', f'[.[] | select(.body | startswith("{MARKER}")) | .id][0]'],
            capture_output=True, text=True
        )
        comment_id = list_result.stdout.strip()

        if comment_id and comment_id != 'null' and comment_id != '':
            subprocess.run(
                ['gh', 'api', f'repos/{repo}/issues/comments/{comment_id}',
                 '-X', 'PATCH', '-f', f'body={comment}'],
                check=True
            )
            print(f"Updated existing coverage comment {comment_id}.")
        else:
            subprocess.run(
                ['gh', 'pr', 'comment', pr, '--repo', repo, '--body', comment],
                check=True
            )
            print("Created new coverage comment.")
        PYEOF

  package:
    name: Package and Publish
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: (github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        
    - name: Setup .NET SDK 10.x
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.x'
        
    - name: Pre-build NetMediate (generates nupkg for source generation integration tests)
      run: |
        dotnet restore src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj
        dotnet build   src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --configuration Release --no-restore
        dotnet restore src/NetMediate/NetMediate.csproj
        dotnet build   src/NetMediate/NetMediate.csproj --configuration Release --no-restore
      # GeneratePackageOnBuild=true places the nupkg in src/NetMediate/bin/Release/.

    - name: Restore dependencies
      run: dotnet restore net-mediate.slnx
      
    - name: Build Release (all projects/targets)
      run: dotnet build net-mediate.slnx --configuration Release
      
    - name: Run Tests
      run: dotnet test tests/NetMediate.Tests/NetMediate.Tests.csproj --configuration Release --verbosity normal

    - name: Run Resilience Tests
      run: dotnet test tests/NetMediate.Resilience.Tests/NetMediate.Resilience.Tests.csproj --configuration Release --verbosity normal

    - name: Run Diagnostics Tests
      run: dotnet test tests/NetMediate.Diagnostics.Tests/NetMediate.Diagnostics.Tests.csproj --configuration Release --verbosity normal
      
    - name: Pack NetMediate package
      run: dotnet pack src/NetMediate/NetMediate.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.Diagnostics package
      run: dotnet pack src/NetMediate.Diagnostics/NetMediate.Diagnostics.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.Moq package
      run: dotnet pack src/NetMediate.Moq/NetMediate.Moq.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.Resilience package
      run: dotnet pack src/NetMediate.Resilience/NetMediate.Resilience.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.SourceGeneration package
      run: dotnet pack src/NetMediate.SourceGeneration/NetMediate.SourceGeneration.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.OpenTelemetry package
      run: dotnet pack src/NetMediate.DataDog.OpenTelemetry/NetMediate.DataDog.OpenTelemetry.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.Serilog package
      run: dotnet pack src/NetMediate.DataDog.Serilog/NetMediate.DataDog.Serilog.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.DataDog.ILogger package
      run: dotnet pack src/NetMediate.DataDog.ILogger/NetMediate.DataDog.ILogger.csproj --configuration Release --output ./packages

    - name: Pack NetMediate.Quartz package
      run: dotnet pack src/NetMediate.Quartz/NetMediate.Quartz.csproj --configuration Release --output ./packages
      
    - name: Get package version
      id: get_version
      run: |
        PKG=$(find ./packages -maxdepth 1 -name 'NetMediate.[0-9]*.nupkg' | sort -V | tail -1)
        if [[ -z "$PKG" ]]; then
          echo "::error::No NetMediate .nupkg found in ./packages — cannot determine release version."
          exit 1
        fi
        BASENAME=$(basename "$PKG")
        VERSION="${BASENAME#NetMediate.}"
        VERSION="${VERSION%.nupkg}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Detected package version: $VERSION"

    - name: List package contents
      run: ls -la ./packages/
      
    - name: Upload package artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
        retention-days: 90
        
    - name: Publish to NuGet
      if: github.ref == 'refs/heads/main'
      run: dotnet nuget push ./packages/*.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        
    - name: Publish to GitHub Packages
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      run: dotnet nuget push ./packages/*.nupkg --api-key $GITHUB_TOKEN --source https://nuget.pkg.github.com/schivei/index.json --skip-duplicate
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package]
    if: github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/v') && github.actor != 'github-actions[bot]')
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Download package artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: nuget-packages
        path: ./packages

    - name: Determine tag name
      id: tag
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
        else
          echo "tag_name=v${{ needs.package.outputs.version }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        tag_name: ${{ steps.tag.outputs.tag_name }}
        target_commitish: ${{ github.sha }}
        files: ./packages/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(steps.tag.outputs.tag_name, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
